{% extends "base.html" %}

{% block main %}
<div class="profile-card">
  <div class="profile-top">
    <img class="profile-img" src="{{ url_for('static', filename='profile.jpg') }}" alt="Profile photo">

    <h2 class="profile-name">{{ full_name }}</h2>
    <p class="profile-username">{{ username }}</p>
    <p class="profile-location">{{ location }}</p>
    <p class="profile-joined">Joined {{ date_joined }}</p>
  </div>

  <div class="profile-bottom">
    <p class="profile-bio">{{ bio }}</p>

    <div class="profile-stats">
      <div class="stat">
        <h3>{{ posts }}</h3>
        <p>Posts</p>
      </div>

      <div class="stat">
        <h3>{{ following }}</h3>
        <p>Following</p>
      </div>

      <div class="stat">
        <h3>{{ followers }}</h3>
        <p>Followers</p>
      </div>
    </div>

    <button class="follow-btn">Follow</button>
  </div>
</div>
{% endblock %}
